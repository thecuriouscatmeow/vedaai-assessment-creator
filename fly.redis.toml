# =============================================================================
# Fly.io — Redis service (self-hosted, internal only)
#
# Accessible within the Fly private network at:
#   redis://vedaai-redis.internal:6379
#
# No public ports exposed — api and worker connect via internal DNS only.
# =============================================================================

app = "vedaai-redis"
primary_region = "iad"

[build]
  image = "redis:7-alpine"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
